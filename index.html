<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Incident Capsule</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <header>
        <p class="eyebrow">Static sample report</p>
        <h1>Incident Capsule</h1>
        <p>Portable incident evidence, rendered from the same JSON contract the CLI emits.</p>
      </header>
      <div data-report-root></div>
    </main>
    <script type="module">
      import { bootSampleReport } from './src/sample-report.js';

      bootSampleReport().catch((error) => {
        const target = document.querySelector('[data-report-root]');
        if (target) {
          target.innerHTML = `<p class="warning">${error.message}</p>`;
        }
      });
    </script>
  </body>
</html>
